name: CI and OpenShift deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore "LibrarySystem.csproj"

      - name: Install dotnet-format
        run: dotnet tool install --global dotnet-format --version 8.0.360

      - name: Verify code formatting
        run: dotnet format --verify-no-changes

      - name: Build project
        run: dotnet build "LibrarySystem.csproj" --configuration Release --no-restore

      - name: Publish artifact for Docker build
        run: dotnet publish "LibrarySystem.csproj" --configuration Release --output publish --no-restore

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: publish

  docker-deploy:
    name: Build Docker image and push to OpenShift
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install OpenShift CLI
        run: |
          curl -L https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz -o oc.tar.gz
          tar xzf oc.tar.gz oc
          sudo mv oc /usr/local/bin/
          rm oc.tar.gz

      - name: Login to OpenShift cluster
        env:
          OPENSHIFT_API_URL: ${{ secrets.OPENSHIFT_API_URL }}
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
          OPENSHIFT_PROJECT: ${{ secrets.OPENSHIFT_PROJECT }}
        run: |
          oc login "$OPENSHIFT_API_URL" --token="$OPENSHIFT_TOKEN" --insecure-skip-tls-verify=true
          oc project "$OPENSHIFT_PROJECT"

      - name: Build and push Docker image
        env:
          OPENSHIFT_PROJECT: ${{ secrets.OPENSHIFT_PROJECT }}
          OPENSHIFT_IMAGE_NAME: ${{ secrets.OPENSHIFT_IMAGE_NAME }}
        run: |
          OPENSHIFT_IMAGE_NAME="${OPENSHIFT_IMAGE_NAME:-librarysystem:latest}"
          IMAGE_REF="$(oc registry info)/${OPENSHIFT_PROJECT}/${OPENSHIFT_IMAGE_NAME}"
          echo "Built image: $IMAGE_REF"
          docker build -t "$IMAGE_REF" .
          docker push "$IMAGE_REF"
